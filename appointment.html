<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>حجز موعد - عيادة د. الألفي</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../static/style.css" />
  </head>
  <body>
    <!-- NAVBAR -->
    <nav class="navbar">
      <div class="nav-logo">🏥 عيادة د. الألفي</div>
      <ul class="nav-links">
        <li><a href="index.html">الرئيسية</a></li>
        <li><a href="appointment.html">حجز موعد</a></li>
        <li><a href="my-appointments.html">حجوزاتي</a></li>
      </ul>
    </nav>

    <!-- APPOINTMENT FORM -->
    <section id="appointment" class="appointment-section">
      <div class="section-title">
        <h2>احجز موعدك</h2>
        <p>املأ البيانات وسنتواصل معك لتأكيد الموعد</p>
      </div>
      <div class="form-container">
        <div class="form-group">
          <label for="name">الاسم الكامل</label>
          <input type="text" id="name" placeholder="أدخل اسمك الكامل" />
        </div>
        <div class="form-group">
          <label for="phone">رقم الهاتف</label>
          <input type="tel" id="phone" placeholder="01xxxxxxxxx" />
        </div>
        <div class="form-group">
          <label for="department">القسم الطبي</label>
          <select id="department">
            <option value="" disabled selected>
              اختر القسم المناسب لحالتك
            </option>
            <option value="general">🩺 الكشف العام</option>
            <option value="heart">❤️ أمراض القلب</option>
            <option value="lab">🔬 تحاليل مخبرية</option>
            <option value="chronic">📋 متابعة الأمراض المزمنة</option>
          </select>
        </div>
        <div class="form-group">
          <label for="date">تاريخ الموعد</label>
          <input type="date" id="date" />
        </div>
        <div class="form-group">
          <label for="time">وقت الموعد</label>
          <input type="time" id="time" />
        </div>
        <button type="button" class="btn-submit" onclick="addAppointment()">
          تأكيد الحجز
        </button>
      </div>
    </section>

    <!-- FOOTER -->
    <footer class="footer">
      <p>© 2025 عيادة د. الألفي — جميع الحقوق محفوظة</p>
      <p>📍 القاهرة، مصر &nbsp;|&nbsp; 📞 01000000000</p>
    </footer>

    <script src="../static/script.js"></script>
  </body>
</html>
